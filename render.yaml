services:
  - type: web
    name: mindlink-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_TOKEN_LIFETIME_MINUTES
        value: 60
      - key: JWT_REFRESH_TOKEN_LIFETIME_DAYS
        value: 7
      - key: MONGODB_URI
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: ORBIT <hello@joinorbit.org>
      - key: OTP_DEBUG_RESPONSE
        value: false
